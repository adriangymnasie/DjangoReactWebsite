services:
  - type: web
    name: soundvision-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: soundvision-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: soundvision-frontend
    env: static
    staticPublishPath: ./frontend/build
    buildCommand: "cd frontend && npm install && npm run build"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false

databases:
  - name: soundvision-db
    plan: free
    region: frankfurt
